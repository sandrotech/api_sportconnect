version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sportconnect-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zlAleeh1234@
      POSTGRES_DB: sportconnect
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: sportconnect-minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Cometa@123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address :9001

volumes:
  pgdata:
  minio-data:
